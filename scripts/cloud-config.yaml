#cloud-config
package_upgrade: true
packages:
  - htop
  - git
  - netcat-openbsd
users:
  - name: scanner
    ssh-authorized-keys:
      - ssh-rsa 
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    groups: sudo
    shell: /bin/bash
write_files:
  - path: /etc/ssh/sshd_config
    content: |
         PubkeyAuthentication yes
         IgnoreRhosts yes
         PasswordAuthentication no
         PermitRootLogin no
         PermitEmptyPasswords no
         KbdInteractiveAuthentication no
         X11Forwarding no
         PrintMotd yes
         PrintLastLog yes
         LogLevel INFO
         AcceptEnv LANG LC_*
         Subsystem sftp /usr/lib/openssh/sftp-server
         UsePAM yes
         ClientAliveInterval 300
         MaxAuthTries 2
         AllowUsers scanner
